<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .box{
        width: 300px;
        height: 300px;
        border: 10px solid black;

        /* padding: 30px; */
        /* padding-top: 30px;
        padding-left: 100px;
        padding-bottom: 0px;
        padding-right: 50px; */

        /* Clockwise : 4 sides */
        /* padding: 100px 30px 20px 50px; */

        /* 2 Sides : top-bottom left-right */
        padding: 100px 200px;

        margin: 30px;
    }
</style>
<body>
    <div class="box">Hello</div>

    <hr>

    <!-- Converted Inline tag into Block Tag -->
    <span style="background-color: blue; display: block;">Hello</span>

    <!-- Converted Block Tag into Inline Tag -->
    <p style="background-color: yellow;  display: inline;">Hello</p>

    <hr>

    <!-- Here tag is inline till the first line as soon as content is on the second line it is block Tag -->
    <div style="background-color: blue; display: inline-block;">
        hello Everyone
        hello Everyone
        hello Everyone
        hello Everyone
        hello Everyone
        hello Everyone
        hello Everyone
        hello Everyone
        hello Everyone
        hello Everyone
        hello Everyone
        hello Everyone
        hello Everyone
    </div>
</body>
</html>
